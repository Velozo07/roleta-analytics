// AUTH
let isLogin=true;
function setTab(t){
  isLogin=t==='l';
  document.getElementById('tL').classList.toggle('a',isLogin);
  document.getElementById('tR').classList.toggle('a',!isLogin);
  document.getElementById('lNF').style.display=isLogin?'none':'block';
  document.getElementById('aB').textContent=isLogin?'ENTRAR':'CADASTRAR';
}
async function doAuth(){
  const e=document.getElementById('lE').value.trim();
  const p=document.getElementById('lP').value;
  if(!e||!p){showLE('Preencha email e senha');return;}
  try{ isLogin?await window._fbSignIn(e,p):await window._fbSignUp(e,p); }
  catch(ex){showLE(ex.message||'Erro na autenticação');}
}
async function doGoogle(){try{await window._fbGoogle();}catch(ex){showLE(ex.message||'Erro Google');}}
function showLE(m){const el=document.getElementById('lErr');el.textContent=m;el.style.display='block';}
async function doLogout(){stopWS();await window._fbSignOut();}

function initAuth(){
  window._fbOnAuth(user=>{
    if(user){
      document.getElementById('LS').style.display='none';
      document.getElementById('AS').classList.add('show');
      addLog('Bem-vindo '+( user.displayName||user.email.split('@')[0]),'success');
      initSession();
      connectWS();
    } else {
      document.getElementById('LS').style.display='flex';
      document.getElementById('AS').classList.remove('show');
      stopWS();
    }
  });
}
if(window._firebaseReady)initAuth();
else document.addEventListener('firebaseReady',initAuth);

// ROLETA ENGINE
const RED=[1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36];
const RORD=[0,32,15,19,4,21,2,25,17,34,6,27,13,36,11,30,8,23,10,5,24,16,33,1,20,14,31,9,22,18,29,7,28,12,35,3,26];
const GEX=[0,26,32];
const NSP=[0,30,17,18,29];
const PT={10:20,20:10,1:21,21:1,11:31,31:11,2:22,22:2,12:32,32:12,3:23,23:3,13:33,33:13,4:24,24:4,14:34,34:14,5:25,25:5,15:35,35:15,6:26,26:6,16:36,36:16,7:27,27:7,8:28,28:8,9:19,19:9};
let hist=[],stats={r:0,b:0,z:0,t:0};

function gc(n){if(n===0)return'green';return RED.includes(n)?'red':'black';}
function gd(n){if(!n)return null;if(n<=12)return 1;if(n<=24)return 2;return 3;}
function gp(n){if(!n)return'zero';return n%2===0?'par':'ímpar';}
function viz(num,q){const i=RORD.indexOf(num);if(i<0)return[num];const v=[];for(let j=-q;j<=q;j++)v.push(RORD[(i+j+RORD.length)%RORD.length]);return v;}
function mfr(h,q,n){const r=h.slice(-n);const c={};r.forEach(x=>{c[x]=(c[x]||0)+1;});return Object.entries(c).sort((a,b)=>b[1]-a[1]).slice(0,q).map(([x])=>parseInt(x));}

let STRATS=[
  {k:'garape',n:'GARAPÉ',d:'Top 3 quentes (50 últimos)',st:'b',t:0,na:[],s:{g:0,gr:0,l:0,p1:0,p2:0,p3:0},
   vrf(h){if(h.length<50)return{ok:0};const t=mfr(h,3,50);const a=h[h.length-1];if(t.includes(a))return{ok:1,ns:[...new Set([...viz(a,7),...GEX])]};return{ok:0};},
   ig(n){return this.na.includes(n);}},
  {k:'bacuri',n:'BACURI',d:'Número quente + par terminal',st:'b',t:0,na:[],s:{g:0,gr:0,l:0,p1:0,p2:0,p3:0},
   vrf(h){if(h.length<50)return{ok:0};const a=h[h.length-1];if(NSP.includes(a))return{ok:0};const q=mfr(h,6,50);if(!q.includes(a))return{ok:0};const p=PT[a];if(!p)return{ok:0};return{ok:1,ns:[...new Set([...viz(p,7),...GEX])]};},
   ig(n){return this.na.includes(n);}},
  {k:'jambu',n:'JAMBU',d:'Sai 20-29 → 0,2,7,18 + 20-29',st:'b',t:0,na:[],s:{g:0,gr:0,l:0,p1:0,p2:0,p3:0},
   vrf(h){const a=h[h.length-1];if(a>=20&&a<=29){const ns=[0,2,7,18];for(let i=20;i<=29;i++)ns.push(i);return{ok:1,ns};}return{ok:0};},
   ig(n){return this.na.includes(n);}},
  {k:'caruru',n:'CARURU',d:'Sequência crescente',st:'b',t:0,na:[],s:{g:0,gr:0,l:0,p1:0,p2:0,p3:0},
   vrf(h){if(h.length<2)return{ok:0};const[ant,at]=[h[h.length-2],h[h.length-1]];if(at===ant+1&&at+1<=36)return{ok:1,ns:[...new Set([0,...viz(at+1,7)])]};return{ok:0};},
   ig(n){return this.na.includes(n);}},
  {k:'miriti',n:'MIRITI',d:'Números espelho',st:'b',t:0,na:[],s:{g:0,gr:0,l:0,p1:0,p2:0,p3:0},
   vrf(h){const esp={13:31,31:13,12:21,21:12,32:23,23:32,22:11,11:22,33:33};const a=h[h.length-1];if(esp.hasOwnProperty(a))return{ok:1,ns:[0,esp[a]]};return{ok:0};},
   ig(n){return this.na.includes(n);}},
  {k:'tucupi',n:'TUCUPI',d:'Sequência decrescente',st:'b',t:0,na:[],s:{g:0,gr:0,l:0,p1:0,p2:0,p3:0},
   vrf(h){if(h.length<2)return{ok:0};const[ant,at]=[h[h.length-2],h[h.length-1]];if(at===ant-1&&at-1>=0)return{ok:1,ns:[...new Set([0,...viz(at-1,7)])]};return{ok:0};},
   ig(n){return this.na.includes(n);}},
  {k:'turu',n:'TURÚ',d:'Sai 30-36 → 0, 26 + 30-36',st:'b',t:0,na:[],s:{g:0,gr:0,l:0,p1:0,p2:0,p3:0},
   vrf(h){const a=h[h.length-1];if(a>=30&&a<=36){const ns=[0,26];for(let i=30;i<=36;i++)ns.push(i);return{ok:1,ns};}return{ok:0};},
   ig(n){return this.na.includes(n);}}
];

function procNum(num){
  if(isNaN(num)||num<0||num>36)return;
  hist.push(num);
  const col=gc(num);
  stats.t++;if(col==='red')stats.r++;else if(col==='black')stats.b++;else stats.z++;
  evalS(num);updateUI(num,col);updS();saveToDB(num,col);
}

function evalS(num){
  STRATS.forEach(s=>{
    if(s.st==='b'){
      const r=s.vrf(hist);
      if(r.ok){s.st='a';s.t=0;s.na=r.ns;s.s.g++;showAl(`🎯 ${s.n} — Apostar: ${r.ns.slice(0,8).join(', ')}...`,'o');addLog(`Gatilho ${s.n} no nº ${num}`,'success');}
    } else {
      s.t++;
      if(s.ig(num)){s.s.gr++;if(s.t===1)s.s.p1++;else if(s.t===2)s.s.p2++;else if(s.t===3)s.s.p3++;s.st='b';s.na=[];showAl(`✅ GREEN! ${s.n} — ${s.t}ª tentativa`,'g');addLog(`GREEN ${s.n} — tent.${s.t}`,'success');}
      else if(s.t>=3){s.s.l++;s.st='b';s.na=[];addLog(`LOSS ${s.n}`,'error');}
    }
  });
}

function updateUI(num,col){
  const ball=document.getElementById('lBall');
  ball.textContent=num;ball.className=`lba ${col} new`;
  setTimeout(()=>ball.classList.remove('new'),400);
  const cl={red:'Vermelho',black:'Preto',green:'Zero'};
  const ic=document.getElementById('iCol');ic.textContent=cl[col];ic.className=`iv ${col}`;
  document.getElementById('iPar').textContent=gp(num);
  const d=gd(num);document.getElementById('iDuz').textContent=d?`${d}ª dúzia`:'—';
  document.getElementById('iTot').textContent=stats.t;
  const wrap=document.getElementById('hWrap');
  const b=document.createElement('div');b.className=`hb2 ${col} new`;b.textContent=num;
  wrap.insertBefore(b,wrap.firstChild);if(wrap.children.length>40)wrap.removeChild(wrap.lastChild);
  setTimeout(()=>b.classList.remove('new'),300);
  const tt=stats.t;
  document.getElementById('sR').textContent=stats.r;document.getElementById('sB').textContent=stats.b;
  document.getElementById('sG').textContent=stats.z;document.getElementById('sTot').textContent=tt;
  document.getElementById('sRP').textContent=tt?((stats.r/tt)*100).toFixed(0)+'%':'0%';
  document.getElementById('sBP').textContent=tt?((stats.b/tt)*100).toFixed(0)+'%':'0%';
  document.getElementById('sGP').textContent=tt?((stats.z/tt)*100).toFixed(0)+'%':'0%';
  let sk=1;for(let i=hist.length-2;i>=0;i--){if(gc(hist[i])===col)sk++;else break;}
  document.getElementById('sStr').textContent=sk>1?`${sk}x`:'—';
}

function updS(){
  const list=document.getElementById('stList');list.innerHTML='';
  STRATS.forEach(s=>{
    const tot=s.s.gr+s.s.l;const tx=tot>0?((s.s.gr/tot)*100).toFixed(0):'—';
    const tr=s.st==='a';
    const div=document.createElement('div');div.className=`stc${tr?' trig':''}`;
    div.innerHTML=`<div class="stn">${s.n}</div><div class="std">${s.d}</div>
    <div class="sts"><span class="ss a">🎯${s.s.g}</span><span class="ss g">✅${s.s.gr}</span><span class="ss r">❌${s.s.l}</span><span class="ss a">📈${tx}%</span>${s.s.g>0?`<span class="ss g">P1:${s.s.p1}</span><span class="ss g">P2:${s.s.p2}</span><span class="ss g">P3:${s.s.p3}</span>`:''}</div>
    ${tr?`<div class="sig str"><span class="sd"></span>GATILHO ATIVO — tent.${s.t}/3</div><div class="bn">Apostar: ${s.na.slice(0,15).join(', ')}${s.na.length>15?'...':''}</div>`:`<div class="sig sw"><span class="sd"></span>Monitorando...</div>`}`;
    list.appendChild(div);
  });
}

function clearAll(){
  hist=[];stats={r:0,b:0,z:0,t:0};
  STRATS.forEach(s=>{s.st='b';s.t=0;s.na=[];s.s={g:0,gr:0,l:0,p1:0,p2:0,p3:0};});
  document.getElementById('lBall').textContent='—';document.getElementById('lBall').className='lba empty';
  document.getElementById('hWrap').innerHTML='';
  ['iCol','iPar','iDuz'].forEach(id=>document.getElementById(id).textContent='—');
  document.getElementById('iTot').textContent='0';
  ['sR','sB','sG','sTot'].forEach(id=>document.getElementById(id).textContent='0');
  ['sRP','sBP','sGP'].forEach(id=>document.getElementById(id).textContent='0%');
  document.getElementById('sStr').textContent='—';
  document.getElementById('lWrap').innerHTML='';
  hideAl();updS();
}

let alT=null;
function showAl(m,t){const b=document.getElementById('alBar');b.textContent=m;b.className=`alb show ${t==='g'?'ga':'oa'}`;clearTimeout(alT);alT=setTimeout(hideAl,4000);}
function hideAl(){document.getElementById('alBar').classList.remove('show');}

function addLog(m,t='info'){
  const w=document.getElementById('lWrap');
  const now=new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  const el=document.createElement('div');el.className='li2';
  el.innerHTML=`<span class="lt2">${now}</span><span class="lm ${t}">${m}</span>`;
  w.insertBefore(el,w.firstChild);if(w.children.length>20)w.removeChild(w.lastChild);
}

// WEBSOCKET
const SID=18749804;
function proxyUrl(u){
  const isHosted=location.hostname.includes('vercel.app')||location.hostname.includes('roleta-analytics')||!location.hostname.includes('localhost');
  if(isHosted){const p=location.protocol==='https:'?'wss:':'ws:';return p+'//'+location.host+'/ws-proxy?url='+encodeURIComponent(u)+'&site_id='+SID;}
  return u+'?site_id='+SID;
}
const SERVERS=['wss://eu-re-it-mg-api.betconstruct.com/ws','wss://it-mg-api.betconstruct.com/ws','wss://eu-re-it-mg-api.betconstruct.com/smart-api','wss://eu-re-it-mg-api.betconstruct.com','wss://it-mg-api.betconstruct.com'];
const BKP='wss://eu-re-it-mg-api.betconstruct.com/smart-api/log/';
let sock=null,fc=0,pi=null,rt=null;

function setWS(s){
  const b=document.getElementById('wBadge');const t=document.getElementById('wTxt');
  b.className=`wb ${s}`;const L={connected:'CONECTADO',connecting:'CONECTANDO...',disconnected:'DESCONECTADO'};
  t.textContent=L[s]||s;
  const ov=document.getElementById('iOvl');const msg=document.getElementById('iMsg');
  if(s==='connected'){ov.classList.add('hide');}
  else{ov.classList.remove('hide');msg.innerHTML=s==='connecting'?'Conectando...<br><small>Aguarde...</small>':'Desconectado<br><small>Reconectando...</small>';}
}

function connectWS(idx=0){
  if(sock){try{sock.close();}catch(e){}}
  clearInterval(pi);clearTimeout(rt);
  let url=fc>=5?BKP:idx>=SERVERS.length?null:SERVERS[idx];
  if(!url){fc++;rt=setTimeout(()=>connectWS(0),5000);return;}
  url=proxyUrl(url);
  setWS('connecting');
  addLog(`Conectando: ${url.split('//')[1].split('/')[0]}...`);
  try{
    sock=new WebSocket(url);
    sock.onopen=()=>{
      fc=0;addLog('Conectado!','success');
      pi=setInterval(()=>{if(sock.readyState===WebSocket.OPEN)sock.send(JSON.stringify({command:'ping'}));},20000);
      const gid=document.getElementById('gSel').value;
      sock.send(JSON.stringify({command:'login_encrypted',params:{site_id:SID,request_id:'auth_1'}}));
      setTimeout(()=>{
        if(sock.readyState===WebSocket.OPEN){
          sock.send(JSON.stringify({command:'get_results',params:{game_id:gid,site_id:SID,request_id:'1'}}));
          sock.send(JSON.stringify({command:'get_results',params:{game_id:'roleta-brasileira',site_id:SID,request_id:'2'}}));
        }
      },2000);
    };
    sock.onmessage=(ev)=>{
      try{
        const d=JSON.parse(ev.data);
        if(d._proxy_status==='connected'){setWS('connected');return;}
        if(d._proxy_status==='error'){sock.close();return;}
        if(d.request_id==='1'||d.request_id==='2'||d.command==='get_results'||d.request_id==='auth_1')setWS('connected');
        const ln=d.last_number??d.data?.last_number??d.result?.last_number??d.msg?.last_number;
        if(ln!==undefined&&ln!==null){const n=Number(ln);if(!isNaN(n)&&n>=0&&n<=36){procNum(n);addLog(`Nº capturado: ${n}`,'success');}}
      }catch(e){}
    };
    sock.onclose=(e)=>{
      setWS('disconnected');clearInterval(pi);
      addLog(`Fechado (${e.code})`,'error');
      if(e.code!==1000)rt=setTimeout(()=>connectWS(idx+1),2000);
    };
    sock.onerror=()=>sock.close();
  }catch(e){connectWS(idx+1);}
}

function stopWS(){clearInterval(pi);clearTimeout(rt);if(sock){try{sock.close(1000);}catch(e){}sock=null;}setWS('disconnected');}
function onGameChange(){if(sock&&sock.readyState===WebSocket.OPEN){const gid=document.getElementById('gSel').value;sock.send(JSON.stringify({command:'get_results',params:{game_id:gid,site_id:SID,request_id:'1'}}));}}
